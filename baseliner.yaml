# Calibrated baseliner policy for the anolishq organization.
# Scanned weekly by .github/workflows/baseliner.yml.
scope:
  github:
    type: org
    name: anolishq
  # This control repo is the scanner's home, not a scanned project.
  exclude:
    - baseliner-control
policy:
  base: default
  repo_ignores:
    # renovate-config is a 4-file Renovate preset (default.json + README + CI +
    # CODEOWNERS) with no build output or local dependencies, so a .gitignore
    # would be empty. Waived as not applicable.
    "anolishq/renovate-config":
      - gitignore_exists

# Privacy guard: this control repo is public and its token can read private
# repos. Redact private/internal repos from the public scan output (console
# logs + results.json artifact). A no-op while the org is all-public; it takes
# effect the moment a private repo is added. See:
# https://baselinerhq.github.io/configuration#privacy-guard
privacy:
  public_context: true
  private_repos: redact
